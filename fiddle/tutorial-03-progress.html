  <style>
@property --progress {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

@property --spotlight-angle {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

:root {
  --vh: 1vh;
  --vw: 1vw;
  --c-white: #ffffff;
  --c-black: #000000;
  --c-black-rgb: 0, 0, 0;
  --c-grey-dark: #333333;
  --c-grey-dark-rgba: 51, 51, 51;
  --c-grey: #999999;
  --c-red: #FF5A37;

  --easing-function: cubic-bezier(0.86, 0, 0.31, 1);
  --easing-function-2: cubic-bezier(0.35, 0.35, 0, 1);
  --easing-timing: 1.5s;

  --g-gap: 0.4rem;
  --g-margin: calc(var(--g-gap) * 2);

  --mm: 0.64rem;
  --m: 0.8rem;
  --p: 1rem;
  --h6: 1.25rem;
  --h5: 1.563rem;
  --h4: 1.953rem;
  --h3: 2.441rem;
  --h2: 3.052rem;
  --h1: 3.815rem;
  --h0: 5.065rem;
  --large: max(6.331rem, 18vw);
  
}
@media (min-width: 1024px) {
  :root {
    --g-margin: calc(var(--g-gap) * 4);
  }
}

html,
body,
* {
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;

}

  border: none;

  cursor: pointer;
  display: block;
  touch-action: manipulation;

.-w {
  display: grid;

  grid-template-rows: repeat(2, 1fr);
  align-items: start;
  column-gap: var(--g-gap);
  position: relative;

}
.-w p {
  grid-column-start: 3;
  grid-column-end: 13;

  align-self: start;
  text-align: center;
  z-index: 40;
  margin-top: calc(var(--h1) * 2);
  padding-left: 10%;
  padding-right: 10%;

}

  .-w p {

.-w .image-1 {
  grid-column-start: 1;
  grid-column-end: 15;
  grid-row-start: 1;
  align-self: center;

  clip-path: rect(

}

  <div class="-w" string="progress" string-enter-vp="top" string-exit-vp="bottom">
  <p>Drawing was a language of thought — a way to understand motion, balance, and harmony.</span>
  <figure class="image-1">
    <img string="lazy" string-lazy="https://picsum.photos/563/533" alt="StringTune">
  </figure>
  <span class="line"></span>
  <h1 class="title -h0 -mid-h2 -m-h3" aria-hidden="true">Balance</h1>
</div>

  <script>
    const stringTune = StringTune.StringTune.getInstance();
    window.StringTuneContext = stringTune;
      stringTune.use(StringTune.StringLazy);
  stringTune.use(StringTune.StringProgress);

    stringTune.start(0);
  </script>
