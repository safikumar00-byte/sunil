<head>

@import url('https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&display=swap');

@property --progress {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

@property --spotlight-angle {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

@property --spotlight-distance {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

:root {
  --vh: 1vh;
  --vw: 1vw;
  --c-white: #ffffff;
  --c-black: #000000;
  --c-black-rgb: 0, 0, 0;
  --c-grey-dark: #333333;
  --c-grey-dark-rgba: 51, 51, 51;
  --c-grey: #999999;
  --c-red: #FF5A37;

  --easing-function: cubic-bezier(0.86, 0, 0.31, 1);
  --easing-function-2: cubic-bezier(0.35, 0.35, 0, 1);
  --easing-timing: 1.5s;

  --g-gap: 0.4rem;
  --g-margin: calc(var(--g-gap) * 2);

  --mm: 0.64rem;
  --m: 0.8rem;
  --p: 1rem;
  --h6: 1.25rem;
  --h5: 1.563rem;
  --h4: 1.953rem;
  --h3: 2.441rem;
  --h2: 3.052rem;
  --h1: 3.815rem;
  --h0: 5.065rem;
  --large: max(6.331rem, 18vw);
  
}
@media (min-width: 1024px) {
  :root {
    --g-margin: calc(var(--g-gap) * 4);
  }
}

html,
body,
* {
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  line-height: 1.25;
  font-family: Arial, Helvetica, sans-serif;
  background-color: #808080;
  color: black;
}
.-w {
  margin-left: var(--g-margin);
  margin-right: var(--g-margin);
}
@media (min-width: 1024px) {
  html {
    font-size: 20px;
  }
}
body {
  position: relative;
  min-height: 100lvh;
}
.note {
  color: var(--c-white);
}
svg {
  display: block;
}
img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
button {
  border: none;
  margin: 0;
  padding: 0;
  position: relative;
  background-color: transparent;
  cursor: pointer;
  display: block;
  touch-action: manipulation;
  color: var(--c-white);
}

h1,
h2,
h3,
h3,
h4,
h5,
h6 {
  font-family: Arial, Helvetica, sans-serif;
  font-weight: normal;
}
.-lrg {
  font-size: var(--large);
}
.-h0 {
  font-size: var(--h0);
}
h1, .-h1 {
  font-size: var(--h1);
}
h2, .-h2 {
  font-size: var(--h2);
}
h3, .-h3 {
  font-size: var(--h3);
}
h4, .-h4 {
  font-size: var(--h4);
}
h5, .-h5 {
  font-size: var(--h5);
}
h6, .-h6 {
  font-size: var(--h6);
}
.-p {
  font-size: var(--p);
}
.-m {
  font-size: var(--m);
}
.-mm {
  font-size: var(--mm);
}
@media (max-width: 1600px) {
  .-mid-lrg {
    font-size: var(--large);
  }
  .-mid-h0 {
    font-size: var(--h0);
  }
  .-mid-h1 {
    font-size: var(--h1);
  }
  .-mid-h2 {
    font-size: var(--h2);
  }
  .-mid-h3 {
    font-size: var(--h3);
  }

  }
  .-mid-h5 {
    font-size: var(--h5);
  }
  .-mid-h6 {
    font-size: var(--h6);
  }
  .-mid-p {
    font-size: var(--p);
  }
  .-mid-m {
    font-size: var(--m);
  }
  .-mid-mm {
    font-size: var(--mm);
  }
}

@media (max-width: 1024px) {
  .-m-lrg {
    font-size: var(--large);
  }
  .-m-h0 {
    font-size: var(--h0);
  }
  .-m-h1 {
    font-size: var(--h1);
  }
  .-m-h2 {
    font-size: var(--h2);
  }
  .-m-h3 {
    font-size: var(--h3);
  }
  .-m-h4 {
    font-size: var(--h4);
  }
  .-m-h5 {
    font-size: var(--h5);
  }
  .-m-h6 {
    font-size: var(--h6);
  }
  .-m-p {
    font-size: var(--p);
  }
  .-m-m {
    font-size: var(--m);
  }
  .-m-mm {
    font-size: var(--mm);
  }
}

.-up {
  text-transform: uppercase;
}
.-tac {
  text-align: center;
}

.-splitted {
  display: flex;
  flex-wrap: wrap;
}
.-s-line {
  display: flex;
  width: 100%;
  will-change: contents;
}
.-s-word {
  display: inline-flex;
  will-change: contents;
}
.-s-char {
  display: inline-flex;
  will-change: contents;
}



.d-line {
  aspect-ratio: initial;
  position: absolute;
  z-index: 10;
  inset-inline: 0;
  width: 100%;
  fill: transparent;
  stroke: var(--c-red);
  stroke-width: 1px;
}

.d-line-1 {
  top: 0;
}

.d-line-2 {
  bottom: 0;
}

.-w {
  position: relative;
}

.start,
.end {
  position: relative;
  z-index: 10;
  display: flex;
  width: 100%;
  height: calc(var(--vh, 1vh) * 100);
  align-items: center;
  justify-content: center;
}

.start {
  margin-bottom: calc(var(--vh, 1vh) * -100);
}

.start span,
.end span {
  border-radius: var(--h3);
  background-color: var(--c-red);
  padding: var(--g-gap) calc(var(--g-gap) * 2);
  text-align: center;
}

.row {
  position: relative;
  width: 100%;
  height: calc(var(--vh, 1svh) * 200);
  margin-bottom: calc(var(--vh, 1svw) * -80);
}

.row-4 {
  margin-bottom: initial;
}

.row > div {
  position: sticky;
  top: 0;
  display: flex;
  width: 100%;
  justify-content: center;
  align-items: flex-start;
  translate: 0 calc(var(--vh, 1vh) * 40);
}

.row > div > span {
  display: inline-flex;
  font-family: "Climate Crisis", sans-serif;
  font-weight: 700;
  line-height: 0.82;
  text-transform: uppercase;
  white-space: nowrap;
  color: transparent;
  transform: translateZ(0);
}


.row > div > span .-s-char {
  position: relative;
  display: inline-flex;
  justify-content: center;
  align-items: flex-start;
  overflow: visible;
  transform: translateZ(0);
  will-change: scale;
  transform-origin: 50% 0%;
  font-size: calc(var(--fit-font-size, 1) * 1px);

  --char-step: calc(0.5 / (var(--char-global-total) + 1));
  --char-begin: calc(0.5 + var(--char-index) * var(--char-step));
  --char-local: calc((var(--progress, 0) - var(--char-begin)) / var(--char-step));
  --char-t: min(1, max(0, var(--char-local)));
  scale: 1 calc(1 - var(--char-t));
}

.row > div > span .-s-char::after {
  content: attr(data-split-content);
  position: absolute;
  line-height: inherit;

  translate: 0 -6.25%;
  transform: translateZ(0);
  will-change: scale, opacity;
  transform-origin: 50% 99.5%;
  color: #f4c7a7;

  font-size: calc( var(--fit-font-size, 1) * 1px * (var(--fit-scale-y) * 0.2) );


  --after-char-step: calc( 0.5 / var(--char-global-total) );
  --after-char-begin: calc( var(--char-index) * var(--after-char-step) );
  --after-char-local: calc( (var(--progress, 0) - var(--after-char-begin)) / var(--after-char-step) );
  --after-char-t: min(1, max(0, var(--after-char-local)));

  scale:
    calc( 1 / (var(--fit-scale-y) * 0.2) )
    min(var(--after-char-t), 0.9375);
  ;
  opacity: calc( var(--after-char-t) * 2 - var(--char-t) * 2 );
}

.sun,
.balloon,
.cloud,
.fly {
  position: absolute;
  z-index: 20;
  width: 40%;
  pointer-events: none;
}

.sun > div > svg,
.balloon > div > svg,
.cloud > div > svg,
.fly > div > svg {
  aspect-ratio: 1 / 1;
  transform-origin: 50% 100%;
}

.sun {
  top: calc(var(--vh, 1vg) * 50);
  left: 5%;
}

.sun > div {
  transform-origin: -50% 100%;
  scale: calc(0.5 + var(--progress));
}

.sun > div > svg {
  animation: cartoon-bounce 1.2s infinite ease-in-out;
}

.balloon {
  top: 20%;
  left: 60%;
}

.balloon > div {
  transform-origin: 150% 100%;
  scale: calc(0.5 + var(--progress));
}

.balloon > div > svg {
  animation: cartoon-bounce 1.5s infinite ease-in-out;
}

.cloud {
  top: 30%;
  left: 30%;
  width: 40%;
}

.cloud > div {
  transform-origin: -50% 100%;
  scale: calc(0.5 + var(--progress));
}

.cloud > div > svg {
  animation: cartoon-bounce 1.05s infinite ease-in-out;
}

.fly {
  top: 60%;
  left: 40%;
}

.fly > div {
  transform-origin: 50% -100%;
  translate: calc(-50% + 100% * var(--progress));
  rotate: calc(30deg - 45deg * var(--progress));
}

.fly > div > svg {
  animation: cartoon-bounce 1.35s infinite ease-in-out;
}

@keyframes cartoon-bounce {
  0% {
    transform: skewX(0deg);
    scale: 1 1;
  }

  25% {
    scale: 1 0.95;
  }

  50% {
    transform: skewX(2deg);
    scale: 1 1;
  }

  75% {
    scale: 1 0.95;
  }

  100% {
    transform: skewX(0deg);
    scale: 1 1;
  }
}

@media (min-width: 1024px) {
  .row {
    height: calc(var(--vw, 1vw) * 200);
    margin-bottom: calc(var(--vw, 1vw) * -90);
  }

  .row-4 {
    margin-bottom: initial;
  }

  .row > div {
    translate: 0 var(--h5);
  }
  .row > div > span .-s-char {}
  .row > div > span .-s-char::after {
    font-size: calc( var(--fit-font-size, 1) * 1px * (var(--fit-scale-y) * 0.9) );

    scale:
      calc( 1 / (var(--fit-scale-y) * 0.9) )
      min(var(--after-char-t), 0.9375);
    ;
  }

  .sun,
  .balloon,
  .cloud,
  .fly {
    width: 25%;
  }
}
</style>
