  <script>
setTimeout(() => {
  const grid = document.getElementById('masonry-grid');
  const colButtons = document.querySelectorAll('#col-controls button');
  const modeButtons = document.querySelectorAll('#mode-controls button');
  const stringTune = window.StringTuneContext;

  const fixedSpeed = 1200;
  const randomNumber = (min, max) => {
    return Math.floor(Math.random() * (max - min + 1)) + min;
  };

  const setActive = (buttons, value, attr) => {
    buttons.forEach((btn) => {
      if (btn.getAttribute(attr) == value) {
        btn.classList.add('-active');
      } else {
        btn.classList.remove('-active');
      }
    });
  };

  colButtons.forEach((btn) => {
    btn.addEventListener('click', () => {
      const cols = parseInt(btn.getAttribute('data-cols'));
      setActive(colButtons, cols, 'data-cols');
      if (stringTune) {
        stringTune.emit('masonry:update:gallery', { cols: cols });
      }
    });
  });

  modeButtons.forEach((btn) => {
    btn.addEventListener('click', () => {
      const mode = btn.getAttribute('data-mode');
      setActive(modeButtons, mode, 'data-mode');
      if (grid) {
        grid.setAttribute('string-masonry-mode', mode);
      }
      if (stringTune) {
        stringTune.emit('masonry:update:gallery', { mode: mode });
      }
    });
  });

  const timingCheckbox = document.getElementById('masonry-random-timing-toggle');

  const updateTiming = () => {
    const isRandom = timingCheckbox?.checked;
    const items = document.querySelectorAll('.masonry-item');

    items.forEach((item, i) => {
      let duration = fixedSpeed.toString();
      if (isRandom) {
        const randomSpeed = randomNumber(1200, 3000);
        duration = randomSpeed.toString();
      }

      item.setAttribute('string-masonry-position-time', duration);
      item.setAttribute('string-masonry-size-time', duration);
    });

    if (stringTune) {
      stringTune.emit('masonry:update:gallery', {});
    }
  };

  stringTune.on('masonry:shuffle:start', () => {
    document.getElementById('masonry-grid').classList.add('shuffling');
  });
  stringTune.on('masonry:shuffle:end', () => {
    document.getElementById('masonry-grid').classList.remove('shuffling');
    // setTimeout(() => {
    //   stringTune.scrollTo(0);
    // }, 30);
  });

  if (timingCheckbox) {
    timingCheckbox.checked = false;
    timingCheckbox.disabled = false;
    timingCheckbox.addEventListener('change', updateTiming);
    updateTiming();
  }

  setActive(colButtons, '3', 'data-cols');
  setActive(modeButtons, 'manual', 'data-mode');

  
  stringTune.emit('masonry:update:gallery', { cols: 3 });

  if (grid) {
    grid.setAttribute('string-masonry-mode', 'manual');
  }
}, 3);

</script>
